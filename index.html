<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🆘 Civic Engagement - Ask for Help</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0066cc;
            --primary-dark: #0052a3;
            --primary-light: #e6f0ff;
            --success: #00aa44;
            --warning: #ff9900;
            --danger: #cc0000;
            --gray-100: #f5f5f5;
            --gray-200: #e0e0e0;
            --gray-600: #666666;
            --gray-700: #444444;
            --gray-900: #1a1a1a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #ffffff;
            color: var(--gray-900);
            line-height: 1.6;
        }

        body.dark-mode {
            background: #1a1a1a;
            color: #f5f5f5;
        }

        header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 1.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        nav {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        nav button {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            padding: 0.75rem 1.25rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        nav button:hover, nav button.active {
            background: white;
            color: var(--primary);
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        section {
            display: none;
        }

        section.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: white;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        body.dark-mode .card {
            background: #2a2a2a;
        }

        .card:hover {
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            transform: translateY(-2px);
        }

        .card-title {
            font-size: 1.3rem;
            margin-bottom: 1rem;
            color: var(--primary);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--gray-700);
        }

        input[type="text"],
        input[type="email"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--gray-200);
            border-radius: 6px;
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1);
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 102, 204, 0.3);
        }

        .btn-secondary {
            background: var(--gray-200);
            color: var(--gray-900);
        }

        .btn-secondary:hover {
            background: var(--gray-300);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: #990000;
        }

        .btn-block {
            width: 100%;
            justify-content: center;
        }

        .alert {
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            display: flex;
            gap: 1rem;
            align-items: flex-start;
        }

        .alert-success {
            background: #e6f8f0;
            color: var(--success);
            border-left: 4px solid var(--success);
        }

        .alert-danger {
            background: #ffe6e6;
            color: var(--danger);
            border-left: 4px solid var(--danger);
        }

        .alert-info {
            background: var(--primary-light);
            color: var(--primary);
            border-left: 4px solid var(--primary);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .resource-card {
            background: var(--primary-light);
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .resource-card h3 {
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .alert-item {
            background: white;
            border-left: 4px solid var(--danger);
            padding: 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
        }

        body.dark-mode .alert-item {
            background: #2a2a2a;
        }

        .option-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .option {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        input[type="radio"],
        input[type="checkbox"] {
            cursor: pointer;
            width: 18px;
            height: 18px;
        }

        .option label {
            margin: 0;
            cursor: pointer;
        }

        .consent-banner {
            background: var(--gray-900);
            color: white;
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
        }

        body.dark-mode .consent-banner {
            background: #444;
        }

        .toggle-switch {
            position: relative;
            width: 50px;
            height: 24px;
            background: var(--gray-300);
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.3s ease;
            border: none;
            margin-left: auto;
        }

        .toggle-switch.active {
            background: var(--success);
        }

        footer {
            background: var(--gray-900);
            color: white;
            text-align: center;
            padding: 2rem 1rem;
            margin-top: 3rem;
            font-size: 0.9rem;
        }

        body.dark-mode footer {
            background: #444;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.4rem;
            }

            nav {
                gap: 0.25rem;
            }

            nav button {
                padding: 0.6rem 1rem;
                font-size: 0.85rem;
            }

            main {
                padding: 1rem 0.5rem;
            }

            .grid {
                grid-template-columns: 1fr;
            }
        }

        .emergency-contact {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: var(--gray-100);
            border-radius: 6px;
            margin-bottom: 0.5rem;
        }

        body.dark-mode .emergency-contact {
            background: #3a3a3a;
        }

        .emergency-contact strong {
            color: var(--danger);
        }

        .question-item {
            background: var(--gray-100);
            padding: 1.5rem;
            border-radius: 6px;
            margin-bottom: 1.5rem;
        }

        body.dark-mode .question-item {
            background: #3a3a3a;
        }

        .question-text {
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--gray-700);
        }

        body.dark-mode .question-text {
            color: #ddd;
        }
    </style>
</head>
<body>
    <header>
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h1>🆘 Ask for Help</h1>
                <p style="opacity: 0.9; margin-top: 0.5rem;">Civic Engagement Platform</p>
            </div>
            <button class="toggle-switch" id="dark-mode-toggle" onclick="toggleDarkMode()"></button>
        </div>
        <nav id="navigation"></nav>
    </header>

    <main id="content"></main>

    <footer>
        <p>© 2026 Ask for Help - Community Engagement Platform</p>
        <p style="margin-top: 0.5rem; font-size: 0.8rem;">All data stored locally • No third-party sharing • Privacy first</p>
    </footer>

    <script>
        class CivicApp {
            constructor() {
                this.user = null;
                this.currentSection = 'hub';
                this.init();
            }

            init() {
                this.loadUser();
                this.renderNavigation();
                this.showSection('hub');
                this.restoreDarkMode();
            }

            loadUser() {
                const stored = localStorage.getItem('civic_user');
                this.user = stored ? JSON.parse(stored) : null;
            }

            renderNavigation() {
                const nav = document.getElementById('navigation');
                nav.innerHTML = `
                    <button onclick="app.showSection('hub')" class="nav-btn active" data-section="hub">📚 Info Hub</button>
                    <button onclick="app.showSection('reporting')" class="nav-btn" data-section="reporting">📍 Report Issues</button>
                    <button onclick="app.showSection('alerts')" class="nav-btn" data-section="alerts">🚨 Alerts</button>
                    <button onclick="app.showSection('questionnaire')" class="nav-btn" data-section="questionnaire">📋 Surveys</button>
                    <button onclick="app.showSection('account')" class="nav-btn" data-section="account">👤 Account</button>
                `;
            }

            showSection(sectionId) {
                this.currentSection = sectionId;
                const content = document.getElementById('content');

                // Update active button
                document.querySelectorAll('.nav-btn').forEach(btn => {
                    btn.classList.remove('active');
                    if (btn.getAttribute('data-section') === sectionId) {
                        btn.classList.add('active');
                    }
                });

                if (sectionId === 'hub') this.renderHub(content);
                else if (sectionId === 'reporting') this.renderReporting(content);
                else if (sectionId === 'alerts') this.renderAlerts(content);
                else if (sectionId === 'questionnaire') this.renderQuestionnaire(content);
                else if (sectionId === 'account') this.renderAccount(content);
            }

            renderHub(container) {
                container.innerHTML = `
                    <section class="active">
                        <h2 style="margin-bottom: 1.5rem; color: var(--primary);">📚 Information Hub</h2>

                        <div class="card">
                            <div class="card-title">🚨 Crisis Response Guides</div>
                            <div id="guides-container"></div>
                        </div>

                        <div class="card">
                            <div class="card-title">🔴 Emergency Contacts</div>
                            <div id="contacts-container"></div>
                        </div>
                    </section>
                `;

                const guides = [
                    { title: 'Safety During Earthquakes', content: 'Drop, Cover, and Hold On! Get under a sturdy desk or table. Stay away from windows.' },
                    { title: 'Flood Response Guide', content: 'Move to higher ground immediately. Never drive through flooded areas. Turn off utilities if safe.' },
                    { title: 'Fire Safety', content: 'Evacuate immediately. Close doors behind you. Use stairs, never elevators. Meet at designated location.' },
                    { title: 'Power Outage Response', content: 'Locate flashlights and batteries. Keep refrigerators closed. Avoid using candles near flammable materials.' }
                ];

                const guidesContainer = document.getElementById('guides-container');
                guidesContainer.innerHTML = guides.map(g => `
                    <div class="resource-card">
                        <h3>${g.title}</h3>
                        <p>${g.content}</p>
                    </div>
                `).join('');

                const contacts = [
                    { name: 'Emergency Services', number: '112', desc: 'Police, Fire, Ambulance' },
                    { name: 'Poison Control', number: '1-800-222-1222', desc: 'Poisoning emergencies' },
                    { name: 'Mental Health Crisis', number: '988', desc: 'Crisis counseling' }
                ];

                const contactsContainer = document.getElementById('contacts-container');
                contactsContainer.innerHTML = contacts.map(c => `
                    <div class="emergency-contact">
                        <div>
                            <strong>${c.name}</strong>
                            <p style="font-size: 0.9rem; color: var(--gray-600);">${c.desc}</p>
                        </div>
                        <button class="btn btn-danger" onclick="navigator.clipboard.writeText('${c.number}'); alert('Copied: ${c.number}')">
                            ${c.number}
                        </button>
                    </div>
                `).join('');
            }

            renderReporting(container) {
                const reports = JSON.parse(localStorage.getItem('civic_reports') || '[]');

                container.innerHTML = `
                    <section class="active">
                        <h2 style="margin-bottom: 1.5rem; color: var(--primary);">📍 Report Urban Issues</h2>

                        <div class="card">
                            <div class="card-title">Submit a Problem Report</div>
                            <form id="report-form">
                                <div class="form-group">
                                    <label>Problem Type</label>
                                    <select id="problem-type" required>
                                        <option value="">-- Select Type --</option>
                                        <option value="pothole">🕳️ Pothole / Road Damage</option>
                                        <option value="lighting">💡 Broken Street Lighting</option>
                                        <option value="debris">🗑️ Debris / Litter</option>
                                        <option value="flooding">💧 Flooding / Water</option>
                                        <option value="tree">🌳 Overgrown Tree</option>
                                    </select>
                                </div>

                                <div class="form-group">
                                    <label>Description</label>
                                    <textarea id="problem-desc" placeholder="Describe the issue..." required></textarea>
                                </div>

                                <div class="form-group">
                                    <label>Severity</label>
                                    <div class="option-group">
                                        <div class="option">
                                            <input type="radio" id="sev-low" name="severity" value="low" checked>
                                            <label for="sev-low">🟢 Low (Cosmetic)</label>
                                        </div>
                                        <div class="option">
                                            <input type="radio" id="sev-med" name="severity" value="medium">
                                            <label for="sev-med">🟡 Medium (Inconvenient)</label>
                                        </div>
                                        <div class="option">
                                            <input type="radio" id="sev-high" name="severity" value="high">
                                            <label for="sev-high">🔴 High (Safety Risk)</label>
                                        </div>
                                    </div>
                                </div>

                                <button type="submit" class="btn btn-primary btn-block">📤 Submit Report</button>
                            </form>
                        </div>

                        <div class="card">
                            <div class="card-title">Your Previous Reports (${reports.length})</div>
                            <div id="reports-list"></div>
                        </div>
                    </section>
                `;

                document.getElementById('report-form').addEventListener('submit', (e) => {
                    e.preventDefault();
                    const report = {
                        id: Date.now(),
                        type: document.getElementById('problem-type').value,
                        desc: document.getElementById('problem-desc').value,
                        severity: document.querySelector('input[name="severity"]:checked').value,
                        date: new Date().toISOString()
                    };
                    reports.push(report);
                    localStorage.setItem('civic_reports', JSON.stringify(reports));
                    alert('✅ Report submitted!');
                    this.renderReporting(container);
                });

                const reportsList = document.getElementById('reports-list');
                if (reports.length === 0) {
                    reportsList.innerHTML = '<p>No reports yet.</p>';
                } else {
                    reportsList.innerHTML = reports.map(r => `
                        <div class="card" style="background: var(--primary-light); margin-bottom: 0.5rem;">
                            <strong>${r.type}</strong> | Severity: ${r.severity}
                            <p style="margin-top: 0.5rem; font-size: 0.9rem;">${r.desc}</p>
                            <p style="font-size: 0.85rem; color: var(--gray-600);">${new Date(r.date).toLocaleDateString()}</p>
                        </div>
                    `).join('');
                }
            }

            renderAlerts(container) {
                const alerts = [
                    { type: 'weather', title: 'Severe Weather Warning', msg: 'Strong winds expected from 2PM to 8PM', source: 'National Weather Service' },
                    { type: 'infrastructure', title: 'Water Main Break', msg: 'Main Street will have no water service until 11PM', source: 'City Water Department' },
                    { type: 'health', title: 'Health Advisory', msg: 'Air quality is moderate. Limit outdoor activity.', source: 'EPA' },
                    { type: 'security', title: 'Public Safety Notice', msg: 'Police investigating incident downtown.', source: 'Police Department' }
                ];

                container.innerHTML = `
                    <section class="active">
                        <h2 style="margin-bottom: 1.5rem; color: var(--primary);">🚨 Emergency Alerts</h2>

                        <div class="card">
                            <div class="card-title">Active Alerts</div>
                            <div id="alerts-container"></div>
                        </div>
                    </section>
                `;

                const alertsContainer = document.getElementById('alerts-container');
                alertsContainer.innerHTML = alerts.map(a => `
                    <div class="alert-item">
                        <strong>${a.title}</strong>
                        <p style="margin-top: 0.5rem;">${a.msg}</p>
                        <p style="margin-top: 0.5rem; font-size: 0.85rem; color: var(--gray-600);">Source: ${a.source}</p>
                    </div>
                `).join('');
            }

            renderQuestionnaire(container) {
                const responses = JSON.parse(localStorage.getItem('civic_responses') || '{}');

                const surveys = [
                    { id: 1, title: 'Community Feedback Survey', questions: 3 },
                    { id: 2, title: 'Emergency Preparedness Quiz', questions: 3 },
                    { id: 3, title: 'Public Safety Concerns', questions: 3 }
                ];

                container.innerHTML = `
                    <section class="active">
                        <h2 style="margin-bottom: 1.5rem; color: var(--primary);">📋 Questionnaires</h2>

                        <div id="surveys-list"></div>
                    </section>
                `;

                const surveysList = document.getElementById('surveys-list');
                surveysList.innerHTML = surveys.map(s => `
                    <div class="card">
                        <div class="card-title">${s.title}</div>
                        <p>${s.questions} questions</p>
                        ${responses[s.id] ? '<p style="color: var(--success);">✅ Completed</p>' : ''}
                        <button class="btn btn-primary btn-small" onclick="app.startSurvey(${s.id})">
                            Start Survey
                        </button>
                    </div>
                `).join('');
            }

            startSurvey(surveyId) {
                const questions = [
                    { text: 'How satisfied are you with local services?', type: 'rating' },
                    { text: 'What\'s the biggest issue in your community?', type: 'text' },
                    { text: 'Do you feel safe in your neighborhood?', type: 'choice', options: ['Very Safe', 'Safe', 'Somewhat Safe', 'Unsafe'] }
                ];

                let html = '<form id="survey-form">';
                questions.forEach((q, idx) => {
                    html += `<div class="question-item">`;
                    html += `<div class="question-text">${q.text}</div>`;
                    if (q.type === 'text') {
                        html += `<textarea name="q${idx}" placeholder="Your answer..." required></textarea>`;
                    } else if (q.type === 'rating') {
                        html += '<div class="option-group">';
                        for (let i = 1; i <= 5; i++) {
                            html += `<div class="option"><input type="radio" name="q${idx}" value="${i}" required><label>${i}</label></div>`;
                        }
                        html += '</div>';
                    } else if (q.type === 'choice') {
                        q.options.forEach((opt, oIdx) => {
                            html += `<div class="option"><input type="radio" name="q${idx}" value="${opt}" required><label>${opt}</label></div>`;
                        });
                    }
                    html += '</div>';
                });
                html += '<button type="submit" class="btn btn-primary btn-block">Submit Survey</button></form>';

                const form = document.createElement('div');
                form.style.cssText = 'position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 500px; width: 90%; z-index: 1000; max-height: 80vh; overflow-y: auto;';
                form.innerHTML = html;
                document.body.appendChild(form);

                document.getElementById('survey-form').addEventListener('submit', (e) => {
                    e.preventDefault();
                    const responses = JSON.parse(localStorage.getItem('civic_responses') || '{}');
                    responses[surveyId] = { date: new Date().toISOString() };
                    localStorage.setItem('civic_responses', JSON.stringify(responses));
                    form.remove();
                    alert('✅ Survey submitted!');
                    this.renderQuestionnaire(document.getElementById('content'));
                });

                const overlay = document.createElement('div');
                overlay.style.cssText = 'position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 999;';
                overlay.onclick = () => { form.remove(); overlay.remove(); };
                document.body.insertBefore(overlay, form);
            }

            renderAccount(container) {
                container.innerHTML = `
                    <section class="active">
                        <h2 style="margin-bottom: 1.5rem; color: var(--primary);">👤 Account & Privacy</h2>

                        <div class="card">
                            <div class="card-title">Your Data</div>
                            <p><strong>Reports:</strong> ${JSON.parse(localStorage.getItem('civic_reports') || '[]').length}</p>
                            <p><strong>Surveys Completed:</strong> ${Object.keys(JSON.parse(localStorage.getItem('civic_responses') || '{}')).length}</p>
                            <button class="btn btn-primary" onclick="app.exportData()">📥 Export Data</button>
                            <button class="btn btn-danger" style="margin-left: 0.5rem;" onclick="app.deleteAccount()">❌ Delete Account</button>
                        </div>

                        <div class="card">
                            <div class="card-title">🔒 Privacy Policy</div>
                            <p><strong>What we collect:</strong> Reports, survey responses, timestamps</p>
                            <p style="margin-top: 0.5rem;"><strong>Data storage:</strong> All data stored locally on your device</p>
                            <p style="margin-top: 0.5rem;"><strong>Data sharing:</strong> No third-party sharing • No data sold</p>
                            <p style="margin-top: 0.5rem;"><strong>Retention:</strong> 12 months for reports • 24 months for surveys</p>
                        </div>
                    </section>
                `;
            }

            exportData() {
                const data = {
                    reports: JSON.parse(localStorage.getItem('civic_reports') || '[]'),
                    responses: JSON.parse(localStorage.getItem('civic_responses') || '{}'),
                    exportDate: new Date().toISOString()
                };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `civic-data-${Date.now()}.json`;
                a.click();
                alert('✅ Data exported!');
            }

            deleteAccount() {
                if (confirm('⚠️ Delete all your data? This cannot be undone!')) {
                    localStorage.clear();
                    alert('✅ Account deleted!');
                    location.reload();
                }
            }
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            document.getElementById('dark-mode-toggle').classList.toggle('active');
            localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        }

        function restoreDarkMode() {
            if (localStorage.getItem('darkMode') === 'true') {
                document.body.classList.add('dark-mode');
                document.getElementById('dark-mode-toggle').classList.add('active');
            }
        }

        const app = new CivicApp();
    </script>
</body>
</html>
